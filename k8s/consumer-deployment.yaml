apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-consumer-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kafka-consumer
  template:
    metadata:
      labels:
        app: kafka-consumer
    spec:
      containers:
      - name: consumer
        image: manivannancsmca/kafka-consumer:fbc98dca44d7ffeeabff74c7364436e2d3b1ac87

        ports:
        - containerPort: 8081

        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-headless.kube-system.svc.cluster.local:9092"

        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
            
